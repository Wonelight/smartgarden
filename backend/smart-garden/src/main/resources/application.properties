spring.application.name=smart-garden
# Server Configuration
server.port=8080
server.servlet.context-path=/api

# ============================================================
# Database Configuration (MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_irrigation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Hibernate Statistics (for monitoring)
spring.jpa.properties.hibernate.generate_statistics=false
logging.level.org.hibernate.stat=INFO

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.smartirrigation=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file configuration
logging.file.name=logs/smart-irrigation.log
logging.file.max-size=10MB
logging.file.max-history=30

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=your-secret-key-change-this-in-production-at-least-256-bits
jwt.expiration=86400000
# 86400000 ms = 24 hours
jwt.refresh-expiration=604800000
# 604800000 ms = 7 days

# ============================================================
# Security Configuration
# ============================================================
# BCrypt encoder strength (10-12 recommended)
security.bcrypt.strength=10

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.exposed-headers=Authorization
cors.allow-credentials=true
cors.max-age=3600

# ============================================================
# Multipart File Upload Configuration
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Jackson Configuration (JSON)
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================================
# Actuator Configuration (Monitoring)
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ============================================================
# WebSocket Configuration
# ============================================================
websocket.allowed-origins=http://localhost:3000,http://localhost:5173
websocket.endpoint=/ws
websocket.broker.relay=/topic
websocket.application.prefix=/app

# ============================================================
# MQTT Configuration (for ESP32 communication)
# ============================================================
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=smart-irrigation-backend
mqtt.username=mqtt_user
mqtt.password=mqtt_password
mqtt.topic.sensor-data=irrigation/sensor-data
mqtt.topic.device-control=irrigation/device-control
mqtt.topic.fuzzy-result=irrigation/fuzzy-result
mqtt.qos=1
mqtt.retained=false

# ============================================================
# Redis Configuration (Caching) - Optional
# ============================================================
#spring.redis.host=localhost
#spring.redis.port=6379
#spring.redis.password=
#spring.redis.database=0
#spring.redis.timeout=60000
#spring.cache.type=redis
#spring.cache.redis.time-to-live=3600000

# ============================================================
# Email Configuration (for notifications) - Optional
# ============================================================
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=your-email@gmail.com
#spring.mail.password=your-app-password
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Scheduling Configuration
# ============================================================
spring.task.scheduling.pool.size=5
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# ============================================================
# API Documentation (Swagger)
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.smartirrigation.controller

# ============================================================
# Application Custom Properties
# ============================================================
app.name=Smart Irrigation System
app.version=1.0.0
app.description=IoT-based smart irrigation system using ESP32, Fuzzy Logic, and Machine Learning

# Data retention (in days)
app.data-retention.sensor-data=180
app.data-retention.irrigation-history=365
app.data-retention.system-log=90

# ML Service Configuration
ml.service.url=http://localhost:5000
ml.service.prediction-endpoint=/predict
ml.service.timeout=30000

# Weather API Configuration (optional)
weather.api.key=your-api-key
weather.api.url=https://api.openweathermap.org/data/2.5
weather.api.update-interval=3600000
# Update every hour

# Device Configuration
device.heartbeat-interval=60000
# 60 seconds
device.offline-threshold=300000
# 5 minutes without heartbeat = offline

# Fuzzy Logic Configuration
fuzzy.default.soil-moisture-min=20.0
fuzzy.default.soil-moisture-max=60.0
fuzzy.default.soil-moisture-optimal=40.0
fuzzy.default.temp-min=15.0
fuzzy.default.temp-max=35.0
fuzzy.default.light-threshold=1000.0

# Irrigation Configuration
irrigation.default.duration-min=30
irrigation.default.duration-max=300
irrigation.safety.max-daily-duration=7200
# Max 2 hours per day
irrigation.safety.min-interval=3600
# Min 1 hour between irrigations

# ============================================================
# Profile-specific Configuration
# ============================================================
# Uncomment to use profiles:
# spring.profiles.active=dev

# Development Profile (application-dev.properties):
# - H2 in-memory database
# - Debug logging
# - Swagger enabled

# Production Profile (application-prod.properties):
# - Production database
# - Error logging only
# - Security hardened
# - Performance optimized