spring.application.name=smart-garden
# Server Configuration
server.port=8081
server.servlet.context-path=/api

# ============================================================
# Database Configuration (MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3307/smart_irrigation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

logging.level.org.hibernate=OFF

# Hibernate Statistics (for monitoring)
spring.jpa.properties.hibernate.generate_statistics=false
logging.level.org.hibernate.stat=OFF

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.smartirrigation=DEBUG
logging.level.org.springframework.web=INFO
#logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=false

# Log file configuration
logging.file.name=logs/smart-irrigation.log
logging.file.max-size=10MB
logging.file.max-history=30

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=cf83e1357eefb8bdf1542850d66d8007d620e4050b5715dc83f4a921d36ce9ce47d0d13c5d85f2b0ff8318d2877eec2f63b931bd47417a81a538327af927da3e
jwt.expiration=86400000
# 86400000 ms = 24 hours
jwt.refresh-expiration=604800000
# 604800000 ms = 7 days

# ============================================================
# Dev / Testing Flags
# ============================================================
app.dev.bypass-time-gate=true

# ============================================================
# Security Configuration
# ============================================================
# BCrypt encoder strength (10-12 recommended)
security.bcrypt.strength=10

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.exposed-headers=Authorization
cors.allow-credentials=true
cors.max-age=3600

# ============================================================
# Multipart File Upload Configuration
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Jackson Configuration (JSON)
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================================
# Actuator Configuration (Monitoring)
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ============================================================
# WebSocket Configuration
# ============================================================
websocket.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175
websocket.endpoint=/ws
websocket.broker.relay=/topic
websocket.application.prefix=/app

# ============================================================
# MQTT Configuration (Backend <-> ESP32, Docker Mosquitto)
# Topic: smart_garden/devices/{deviceCode}/status|sensor|heartbeat|lwt|cmd|cmd/ack
# ============================================================
mqtt.broker-url=tcp://192.168.0.199:1883
mqtt.client-id=smart-garden-backend
mqtt.username=
mqtt.password=
# cleanSession=false: giữ subscription khi reconnect
mqtt.clean-session=false
mqtt.connection-timeout=30
mqtt.keep-alive-interval=60
mqtt.automatic-reconnect=true
# TLS (production): dùng ssl://host:8883 và cấu hình ACL trên broker
mqtt.ssl=false
# Command ACK
mqtt.command-ack-timeout-ms=15000
mqtt.command-retry-count=2
mqtt.duplicate-window-ms=60000
mqtt.heartbeat-timeout-ms=120000

# ============================================================
# Redis Configuration (Caching) - Optional
# ============================================================
#spring.redis.host=localhost
#spring.redis.port=6379
#spring.redis.password=
#spring.redis.database=0
#spring.redis.timeout=60000
#spring.cache.type=redis
#spring.cache.redis.time-to-live=3600000

# ============================================================
# Email Configuration (for forgot password)
# ============================================================
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=your-email@gmail.com
#spring.mail.password=your-app-password
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# URL gốc frontend để tạo link đặt lại mật khẩu trong email
app.frontend.url=http://localhost:5173
# Địa chỉ email gửi đi (hiển thị trong From)
app.mail.from=smartgarden@localhost

# ============================================================
# Scheduling Configuration
# ============================================================
spring.task.scheduling.pool.size=5
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# ============================================================
# API Documentation (Swagger)
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.example.smart_garden.controller

# ============================================================
# Init Data (Role/Permission = enum in code; accounts = seed below)
# ============================================================
app.init.enabled=true
app.init.admin.username=admin
app.init.admin.password=Admin@123
app.init.admin.email=admin@smartgarden.local
app.init.admin.full-name=System Admin
app.init.default-user.enabled=true
app.init.default-user.username=user
app.init.default-user.password=User@123
app.init.default-user.email=user@smartgarden.local
app.init.default-user.full-name=Default User

# ============================================================
# Application Custom Properties
# ============================================================
app.name=Smart Irrigation System
app.version=1.0.0
app.description=IoT-based smart irrigation system using ESP32, Fuzzy Logic, and Machine Learning

# Data retention (in days)
app.data-retention.sensor-data=180
app.data-retention.irrigation-history=365
app.data-retention.system-log=90

# AI Service Configuration (Python FastAPI)
ai-service.url=http://localhost:5000
ai-service.predict-endpoint=/ai/predict
ai-service.train-endpoint=/ai/train
ai-service.timeout=60000
ai-service.default-epochs=100
ai-service.default-learning-rate=0.01

# Weather API Configuration (optional)
weather.api.key=6845ac33d8ffe4ecd1a8a0242372ab97
weather.api.url=https://api.openweathermap.org/data/2.5
weather.api.update-interval=3600000
# Update every hour

# Device Configuration
device.heartbeat-interval=60000
# 60 seconds
device.offline-threshold=300000
# 5 minutes without heartbeat = offline

# Fuzzy Logic Configuration
fuzzy.default.soil-moisture-min=20.0
fuzzy.default.soil-moisture-max=60.0
fuzzy.default.soil-moisture-optimal=40.0
fuzzy.default.temp-min=15.0
fuzzy.default.temp-max=35.0
fuzzy.default.light-threshold=1000.0

# Irrigation Configuration
irrigation.default.duration-min=30
irrigation.default.duration-max=300
irrigation.safety.max-daily-duration=7200
# Max 2 hours per day
irrigation.safety.min-interval=3600
# Min 1 hour between irrigations

# ============================================================
# Profile-specific Configuration
# ============================================================
# Để dùng mail gửi quên mật khẩu: spring.profiles.active=local
# (application-local.properties chứa cấu hình SMTP, đã gitignore)
# Uncomment to use profiles:
spring.profiles.active=local

# Development Profile (application-dev.properties):
# - H2 in-memory database
# - Debug logging
# - Swagger enabled

# Production Profile (application-prod.properties):
# - Production database
# - Error logging only
# - Security hardened
# - Performance optimized