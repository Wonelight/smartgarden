# Mosquitto MQTT broker cho Backend <-> ESP32
# Chạy: docker compose -f docker-compose.mqtt.yml up -d
# Cấu hình broker (listener 1883, 9001 WS) đặt trong mosquitto/config hoặc dùng default

version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smart-garden-mqtt
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSockets
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/data:/mosquitto/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$SYS/broker/version", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3
